name: Check Pull Request

on:
  pull_request:
    branches:
      - main
      - release/*
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

jobs:
  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "10.0.x"
      - name: Check out code
        uses: actions/checkout@v3
        with:
          path: working-dir
      - name: Restore
        run: dotnet restore ./working-dir/CadsBridge.sln
      - name: Build
        run: dotnet build ./working-dir/CadsBridge.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test ./working-dir/CadsBridge.sln

    ## SonarCloud
    ## Uncomment to unable SonarCloud scan
    ## Requires project to be set up in SonarCloud
    ## and the SonarCloud token to be set in the repository secrets
